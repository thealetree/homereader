<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homer — The Odyssey</title>
  <link rel="stylesheet" href="css/main.css">
  <script>
    /* Resolve the theme before first paint so there is no flash of the wrong
       palette. Saved choice wins; otherwise follow the system. */
    (function () {
      try {
        var t = localStorage.getItem("homer-theme");
        if (t !== "dark" && t !== "light") {
          t = window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        }
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "light");
      }
    })();
  </script>
</head>
<body>

  <button class="theme-toggle" id="theme-toggle" type="button">
    <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"/>
      <path d="M12 2.5v2M12 19.5v2M4.5 12h2M17.5 12h2M6.4 6.4l1.4 1.4M16.2 16.2l1.4 1.4M17.6 6.4l-1.4 1.4M7.8 16.2l-1.4 1.4"/>
    </svg>
  </button>

  <header class="masthead">
    <h1>The Odyssey</h1>
    <div class="book-select" id="book-select">
      <button class="book-current" id="book-current" type="button"
              aria-haspopup="listbox" aria-expanded="false">Book I</button>
      <ul class="book-menu" id="book-menu" role="listbox" hidden></ul>
    </div>
    <p class="book-count" id="book-count"></p>
  </header>

  <div class="pane-toggle" id="pane-toggle" aria-label="Which page to show">
    <button class="pane-btn" data-pane="source" type="button">Source</button>
    <button class="pane-btn" data-pane="stylized" type="button">Stylized</button>
  </div>

  <main class="spread" id="spread">

    <section class="page page-greek" aria-label="Greek text">
      <div class="crib-controls" id="crib-controls" aria-label="Line-by-line gloss style" hidden>
        <span class="crib-label" data-crib="interlinear">Interlinear</span>
        <span class="crib-label" data-crib="literal">Literal</span>
      </div>
      <div class="page-body" id="greek-body"></div>
      <footer class="col-attribution">
        <p>Greek text: Homer, <em>Odyssey</em>, edited by A. T. Murray (Loeb
          Classical Library, 1919), via the
          <a href="https://www.perseus.tufts.edu/">Perseus Digital Library</a>.
          Public domain.</p>
        <p>Line-by-line glosses and stylized translations written with Claude,
          released under CC0.</p>
      </footer>
    </section>

    <div class="gutter" aria-hidden="true"></div>

    <section class="page page-english" aria-label="Translation">
      <div class="controls">
        <div class="style-buttons" aria-label="Translation style">
          <button class="style-btn" data-style="elizabethan">Elizabethan</button>
          <button class="style-btn" data-style="modernist">Modernist</button>
          <button class="style-btn" data-style="storybook">Storybook</button>
        </div>
      </div>
      <div class="page-body" id="english-body"></div>
    </section>

  </main>

  <button class="edge-arrow edge-arrow-prev" id="edge-prev" type="button"
          aria-label="Previous card">&#8249;</button>
  <button class="edge-arrow edge-arrow-next" id="edge-next" type="button"
          aria-label="Next card">&#8250;</button>

  <nav class="pager" aria-label="Card position">
    <span id="pager-label" class="pager-label">1 / 1</span>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
