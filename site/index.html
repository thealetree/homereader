<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homer — The Odyssey</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <header class="masthead">
    <h1>The Odyssey</h1>
    <p class="masthead-sub" id="location-label">Book I</p>
  </header>

  <main class="spread" id="spread">

    <section class="page page-greek" aria-label="Greek text">
      <div class="page-body" id="greek-body"></div>
    </section>

    <div class="gutter" aria-hidden="true"></div>

    <section class="page page-english" aria-label="Translation">
      <div class="controls">
        <div class="fidelity">
          <input type="range" id="fidelity-slider" min="0" max="3" step="1" value="2"
                 aria-label="Translation fidelity">
          <div class="fidelity-labels">
            <span data-stop="0">Interlinear</span>
            <span data-stop="1">Literal</span>
            <span data-stop="2">Natural</span>
            <span data-stop="3">Free</span>
          </div>
        </div>
        <div class="flavors" id="flavors" aria-label="Free translation flavor">
          <button class="chip" data-flavor="homeric">Homeric</button>
          <button class="chip" data-flavor="shakespearean">Shakespearean</button>
          <button class="chip" data-flavor="modernist">Modernist</button>
          <button class="chip" data-flavor="lucretian">Lucretian</button>
          <button class="chip" data-flavor="storybook">Storybook</button>
        </div>
      </div>
      <div class="page-body" id="english-body"></div>
    </section>

  </main>

  <nav class="pager" aria-label="Card navigation">
    <button id="prev" class="pager-arrow" aria-label="Previous card">&#8592;</button>
    <span id="pager-label" class="pager-label">1 / 1</span>
    <button id="next" class="pager-arrow" aria-label="Next card">&#8594;</button>
  </nav>

  <script src="js/app.js"></script>
</body>
</html>
